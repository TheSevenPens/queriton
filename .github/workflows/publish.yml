name: publish

# Publishes @thesevenpens/queriton to GitHub Packages on tag pushes.
# Authenticates with the workflow's built-in GITHUB_TOKEN — no extra
# secrets needed. When the public npmjs.org release happens (DrawTab
# issue #143), this file will gain a second publish step against
# registry.npmjs.org with provenance.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@thesevenpens'
          cache: 'npm'
      - run: npm install
      - run: npm test
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
